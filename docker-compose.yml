services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghar_kharcha
      POSTGRES_USER: ghar
      POSTGRES_PASSWORD: ghar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghar -d ghar_kharcha"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    env_file:
      - packages/api/.env
    environment:
      DATABASE_URL: postgresql://ghar:ghar@db:5432/ghar_kharcha
      UPLOAD_DIR: /data/uploads
      PORT: 3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - upload_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  upload_data:
