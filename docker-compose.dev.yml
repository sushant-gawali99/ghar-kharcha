services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghar_kharcha
      POSTGRES_USER: ghar
      POSTGRES_PASSWORD: ghar
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghar -d ghar_kharcha"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_dev:
